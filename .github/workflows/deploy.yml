
name: Safe Deploy to InfinityFree

on:
  push:
    branches:
      - main  # Trigger deployment only on main branch

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Backup current /htdocs/ on server
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: /dev/null   # No local files, just trigger server connection
          server-dir: /htdocs/wordpress/wp-content/themes/new-horizon-developments/     # Remote folder to backup
          remote-backup-dir: /htdocs_backup/  # Destination backup folder
          protocol: ftps
          passive: true
          dry-run: false
          timeout: 600

      - name: Deploy source code
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./src          # Only your source code
          server-dir: /htdocs/      # Destination folder
          protocol: ftps
          passive: true
          dry-run: false
          timeout: 600
          exclude: .git,node_modules,.github,tests,assets