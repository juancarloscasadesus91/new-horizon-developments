name: Deploy to InfinityFree

on:
  push:
    branches:
      - main  # Trigger deployment only on push to main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ftpupload.net               # Your InfinityFree FTP server
          username: ${{ secrets.FTP_USER }}  # FTP username stored in GitHub Secrets
          password: ${{ secrets.FTP_PASSWORD }} # FTP password stored in GitHub Secrets
          local-dir: ./src                    # Local folder to upload (only your source code)
          server-dir: /htdocs/                # Destination folder on InfinityFree
          protocol: ftps                       # Use FTPS (more secure than FTP)
          passive: true                        # Enable passive mode for more stable connection
          dry-run: false                        # Set true to test first without uploading
          timeout: 600                          # Increase timeout for slower connections
          exclude: .git,node_modules,.github   # Exclude unnecessary folders/files